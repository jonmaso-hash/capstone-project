{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}
    {% for article in blog %}
        <h1>{{ article.title }}</h1>

        {% if article.image %}
            <img src="{{ article.image.url }}">
        {% endif %}

        <p>{{ article.body }}</p>

        <hr>
    {% endfor %}
{% endblock %}
