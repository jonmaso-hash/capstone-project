{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}


{% block title %}
    Create New post
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/new.css' %}">
{% endblock %}

{% block content %}
    <h1>New Post</h1>
    <form method ="post">
        {% csrf_token %}
        {{ form|crispy }}
        <input type="submit" value="Create" class="btn btn-success">
    </form>
{% endblock %}
