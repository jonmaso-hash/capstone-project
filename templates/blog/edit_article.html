{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4">Edit Article</h2>
                    <p class="text-muted">Update your insights for the community.</p>
                    
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {{ form.as_p }}
                        
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                            <a href="{% url 'blog_view' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
