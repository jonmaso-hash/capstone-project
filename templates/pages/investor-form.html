<form method="post" action="">
    <h2>Investor Application</h2>

    <!-- Full Name -->
    <label for="full_name">Full Name</label><br>
    <input type="text" id="full_name" name="full_name" required><br><br>

    <!-- Email Address -->
    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <!-- Phone Number -->
    <label for="phone">Phone Number</label><br>
    <input type="tel" id="phone" name="phone" required><br><br>

    <!-- Company Name -->
    <label for="company">Company Name</label><br>
    <input type="text" id="company" name="company"><br><br>

    <!-- Investment Focus -->
    <label for="focus">Investment Focus / Interest Areas</label><br>
    <textarea id="focus" name="investment_focus" rows="4" required></textarea><br><br>

    <!-- Investment Stage Dropdown -->
    <label for="stage">Stages You Invest In</label><br>
    <select id="stage" name="investment_stage" required>
        <option value="">-- Select Stage --</option>
        <option value="pre_seed">Pre-Seed</option>
        <option value="seed">Seed</option>
        <option value="series_a">Series A</option>
        <option value="series_b">Series B</option>
        <option value="growth">Series C+</option>
    </select><br><br>

    <!-- Investment Amount -->
    <label for="amount">Estimated Investment Amount (USD)</label><br>
    <input type="text" id="amount" name="investment_amount" 
           pattern="^\d{1,3}(,\d{3})*(\.\d{2})?$" 
           placeholder="e.g. 10,000 or 1,000,000.00" required><br><br>

    <!-- Experience -->
    <label for="experience">Relevant Experience or Portfolio</label><br>
    <textarea id="experience" name="experience" rows="4"></textarea><br><br>

    <!-- Submit -->
    <button type="submit">Submit Application</button>
</form>
